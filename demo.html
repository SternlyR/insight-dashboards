<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>YouTube Shorts — Demo</title>
<style>
  :root {
    --red:      #FF0000;
    --red-dim:  rgba(255,0,0,0.18);
    --red-glow: rgba(255,0,0,0.30);
    --bg:       #080808;
    --surface:  #0f0f0f;
    --border:   #1e1e1e;
    --text:     #ffffff;
    --dim:      #606060;
    --dim2:     #3a3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body { display: flex; flex-direction: column; }

  /* ──────────────────────────────────────────────────────
     HEADER
  ────────────────────────────────────────────────────── */
  #header {
    flex: 0 0 192px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 36px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 18px;
  }

  #header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #channel-id {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #channel-icon {
    width: 44px; height: 44px;
    background: var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #channel-icon svg { width: 22px; height: 22px; fill: #fff; }

  #channel-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  #channel-handle {
    font-size: 12px;
    color: var(--dim);
    margin-top: 1px;
  }

  #yt-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  #yt-badge svg { width: 18px; height: 13px; }
  #yt-badge span { font-size: 11px; color: var(--dim); letter-spacing: 0.5px; text-transform: uppercase; }

  /* Stat row */
  #stat-row {
    display: flex;
    align-items: stretch;
    gap: 0;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-right: 36px;
    margin-right: 36px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; padding-right: 0; margin-right: 0; }

  .stat-icon {
    width: 40px; height: 40px;
    background: var(--red-dim);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .stat-icon svg { width: 20px; height: 20px; fill: var(--red); }

  .stat-body { display: flex; flex-direction: column; }

  .stat-value {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .stat-value.accent { color: var(--red); }

  .stat-meta {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 4px;
  }

  /* ──────────────────────────────────────────────────────
     SECTION LABEL
  ────────────────────────────────────────────────────── */
  #section-label {
    flex: 0 0 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  #section-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #refresh-badge {
    font-size: 10px;
    color: var(--dim2);
    letter-spacing: 0.5px;
  }
  #refresh-badge span { color: var(--dim); }

  /* ──────────────────────────────────────────────────────
     GRID
  ────────────────────────────────────────────────────── */
  #grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 2px;
    background: #000;
  }

  .card {
    position: relative;
    overflow: hidden;
    background: #111;
    transition: box-shadow 0.25s ease;
  }

  .card.active {
    box-shadow: inset 0 0 0 2px var(--red);
    z-index: 2;
  }

  /* Inner red border glow for active card */
  .card.active::before {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 40px rgba(255,0,0,0.18);
    z-index: 3;
    pointer-events: none;
  }

  .card-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Overlay: bottom gradient + stats */
  .card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 14px 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
    z-index: 2;
  }

  .card-stats {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .cs {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .cs svg { width: 12px; height: 12px; fill: rgba(255,255,255,0.55); flex-shrink: 0; }

  .card-rank {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 3;
    font-size: 11px;
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }

  /* Playing indicator */
  .card.active .card-playing {
    display: flex;
  }
  .card-playing {
    display: none;
    position: absolute;
    top: 10px; right: 10px;
    z-index: 3;
    align-items: center;
    gap: 5px;
    background: var(--red);
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.8px;
    animation: blink 1.8s ease-in-out infinite;
  }
  .card-playing::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #fff;
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.45} }

  /* ──────────────────────────────────────────────────────
     CHART SECTION
  ────────────────────────────────────────────────────── */
  #chart-section {
    flex: 0 0 264px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 18px 28px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #chart-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #chart-peak {
    font-size: 10px;
    color: var(--dim2);
  }
  #chart-peak strong { color: var(--dim); font-weight: 600; }

  #chart-wrap {
    flex: 1;
    position: relative;
  }

  canvas { display: block; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div id="header">
  <div id="header-top">
    <div id="channel-id">
      <div id="channel-icon">

      </svg>
      <span>Live</span>
    </div>
  </div>

  <div id="stat-row">
    <div class="stat">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>

    <div class="stat">
      <div class="stat-icon">
        <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>

</div>

<!-- ── Section label ───────────────────────────────────────── -->
<div id="section-label">
  <span id="section-title">Top Shorts · Last 7 Days</span>
  <span id="refresh-badge">Next refresh in <span id="countdown">14:52</span></span>
</div>

<!-- ── 3×3 Grid ────────────────────────────────────────────── -->
<div id="grid"></div>

<!-- ── Chart ──────────────────────────────────────────────── -->
<div id="chart-section">
  <div id="chart-header">
    <span id="chart-label">Views · Last 24 Hours</span>
    <span id="chart-peak">Peak <strong id="peak-val">—</strong></span>
  </div>
  <div id="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script>
// ── Mock data ──────────────────────────────────────────────────────────────────
const METRICS = { views: 13820000, likes: 947000, comments: 34200 };

const VIDEOS = [
  { id:1, v:3840000, l:287000, c:8420,  g:["#0d2b4a","#1a5c8a"], label:"Ocean" },
  { id:2, v:2910000, l:198000, c:6230,  g:["#3a0a0a","#8b1a1a"], label:"Fire"  },
  { id:3, v:2340000, l:156000, c:4890,  g:["#0a2b14","#1a6b34"], label:"Forest"},
  { id:4, v:1870000, l:143000, c:9100,  g:["#1a0a3a","#4a1a8a"], label:"Night" },
  { id:5, v:1560000, l:112000, c:5670,  g:["#042020","#0a5555"], label:"Teal"  },
  { id:6, v:1230000, l:98700,  c:3210,  g:["#2a1e00","#7a5a00"], label:"Gold"  },
  { id:7, v:980000,  l:76500,  c:4320,  g:["#080d20","#1a2d60"], label:"Winter"},
  { id:8, v:760000,  l:61200,  c:2980,  g:["#200808","#601a1a"], label:"Crimson"},
  { id:9, v:540000,  l:48900,  c:1870,  g:["#101010","#2a2a2a"], label:"Mono"  },
];

function gauss(x,mu,sig,amp){ return amp*Math.exp(-0.5*Math.pow((x-mu)/sig,2)); }
function buildChart(){
  const lbl=[], val=[];
  for(let h=0;h<24;h++) for(let q=0;q<4;q++){
    const t=h+q*0.25;
    const v=Math.round(
      gauss(t,7,1.5,14000)+gauss(t,12,2,20000)+
      gauss(t,19,2.5,28000)+(Math.random()-.5)*1600+600
    );
    lbl.push(`${String(h).padStart(2,"0")}:${String(q*15).padStart(2,"0")}`);
    val.push(Math.max(180,v));
  }
  return {lbl,val};
}

// ── Formatting ─────────────────────────────────────────────────────────────────
function fmt(n){
  if(n>=1e6) return(n/1e6).toFixed(n>=10e6?1:2)+"M";
  if(n>=1e3) return(n/1e3).toFixed(n>=100e3?0:1)+"K";
  return n.toLocaleString();
}

// ── Count-up ───────────────────────────────────────────────────────────────────
function countUp(el,target){
  const steps=80,dur=2800;
  let step=0;
  const t=setInterval(()=>{
    step++;
    const p=step/steps;
    const ease=p<0.5?2*p*p:-1+(4-2*p)*p;
    el.textContent=fmt(Math.round(target*ease));
    if(step>=steps){clearInterval(t);el.textContent=fmt(target);}
  },dur/steps);
}

// ── SVG icons ──────────────────────────────────────────────────────────────────
const EYE  = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>`;
const LIKE = `<svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>`;

// ── Grid ───────────────────────────────────────────────────────────────────────
function buildGrid(){
  const g=document.getElementById("grid");
  VIDEOS.forEach((v,i)=>{
    const card=document.createElement("div");
    card.className="card"+(i===0?" active":"");
    card.dataset.i=i;

    // gradient canvas as background
    const cv=document.createElement("canvas");
    cv.className="card-bg";
    card.appendChild(cv);

    const overlay=document.createElement("div");
    overlay.className="card-overlay";
    overlay.innerHTML=`<div class="card-stats">
      <span class="cs">${EYE}${fmt(v.v)}</span>
      <span class="cs">${LIKE}${fmt(v.l)}</span>
    </div>`;

    const rank=document.createElement("div");
    rank.className="card-rank";
    rank.textContent=i+1;

    const playing=document.createElement("div");
    playing.className="card-playing";
    playing.textContent="LIVE";

    card.appendChild(overlay);
    card.appendChild(rank);
    card.appendChild(playing);
    g.appendChild(card);

    // Draw gradient after layout
    requestAnimationFrame(()=>{
      const r=card.getBoundingClientRect();
      const w=r.width||360, h=r.height||480;
      cv.width=w; cv.height=h;
      const ctx=cv.getContext("2d");
      const gr=ctx.createLinearGradient(0,0,w*0.6,h);
      gr.addColorStop(0,v.g[1]);
      gr.addColorStop(1,v.g[0]);
      ctx.fillStyle=gr;
      ctx.fillRect(0,0,w,h);
      // Subtle center label
      ctx.fillStyle="rgba(255,255,255,0.06)";
      ctx.font=`900 ${Math.round(w*0.12)}px -apple-system,sans-serif`;
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText(v.label,w/2,h/2);
    });

    card.addEventListener("click",()=>setActive(i));
  });
}

let activeIdx=0, holdTimer=null;
function setActive(idx){
  activeIdx=((idx%9)+9)%9;
  document.querySelectorAll(".card").forEach((c,i)=>c.classList.toggle("active",i===activeIdx));
  clearTimeout(holdTimer);
  holdTimer=setTimeout(()=>setActive(activeIdx+1),4000);
}

// ── Chart ──────────────────────────────────────────────────────────────────────
function buildChartViz(){
  const {lbl,val}=buildChart();
  const peak=Math.max(...val);
  document.getElementById("peak-val").textContent=fmt(peak)+" views";

  const wrap=document.getElementById("chart-wrap");
  const cv=document.getElementById("chart");
  cv.width=wrap.clientWidth||1024;
  cv.height=wrap.clientHeight||200;

  new Chart(cv.getContext("2d"),{
    type:"bar",
    data:{
      labels:lbl,
      datasets:[{
        data:val,
        backgroundColor:(ctx)=>{
          const max=ctx.chart.data.datasets[0].data.reduce((a,b)=>Math.max(a,b),0);
          return ctx.raw===max?"rgba(255,0,0,0.95)":"rgba(255,0,0,0.45)";
        },
        borderWidth:0,
        borderRadius:2,
        hoverBackgroundColor:"rgba(255,0,0,0.9)",
      }]
    },
    options:{
      responsive:false,
      animation:{duration:900,delay:(c)=>c.dataIndex*3},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:"rgba(0,0,0,0.85)",
          titleColor:"#888",
          bodyColor:"#fff",
          padding:8,
          callbacks:{label:(c)=>` ${fmt(c.raw)} views`}
        }
      },
      scales:{
        x:{
          ticks:{color:"#383838",font:{size:8},maxRotation:0,maxTicksLimit:13},
          grid:{color:"rgba(255,255,255,0.02)"},
          border:{color:"#1a1a1a"},
        },
        y:{
          ticks:{color:"#383838",font:{size:8},callback:(v)=>fmt(v)},
          grid:{color:"rgba(255,255,255,0.03)"},
          border:{color:"#1a1a1a"},
        }
      }
    }
  });
}

// ── Countdown ──────────────────────────────────────────────────────────────────
let secs=14*60+52;
setInterval(()=>{
  secs=Math.max(0,secs-1);
  const m=String(Math.floor(secs/60)).padStart(2,"0");
  const s=String(secs%60).padStart(2,"0");
  document.getElementById("countdown").textContent=`${m}:${s}`;
},1000);

// ── Boot ───────────────────────────────────────────────────────────────────────
buildGrid();
