<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>YouTube Shorts — Live</title>
<style>
  :root {
    --red:      #FF0000;
    --red-dim:  rgba(255,0,0,0.18);
    --red-glow: rgba(255,0,0,0.28);
    --bg:       #080808;
    --surface:  #0f0f0f;
    --border:   #1e1e1e;
    --text:     #ffffff;
    --dim:      #606060;
    --dim2:     #3a3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body { display: flex; flex-direction: column; }

  /* ── Header ─────────────────────────────────────────── */
  #header {
    flex: 0 0 192px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 36px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 18px;
  }

  #header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #channel-id {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #channel-icon {
    width: 44px; height: 44px;
    background: var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #channel-icon svg { width: 22px; height: 22px; fill: #fff; }

  #channel-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  #channel-handle { font-size: 12px; color: var(--dim); margin-top: 1px; }

  #yt-badge {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  #yt-badge svg { width: 22px; height: 16px; }
  #yt-badge span { font-size: 11px; color: var(--dim); letter-spacing: 0.5px; text-transform: uppercase; }

  /* Stat row */
  #stat-row {
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 0 48px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat-value {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -3px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat-value.accent { color: var(--red); }

  .stat-meta {
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* ── Section label ───────────────────────────────────── */
  #section-label {
    flex: 0 0 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 36px;
    border-bottom: 1px solid var(--border);
  }

  #section-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #refresh-info {
    position: absolute;
    right: 36px;
    font-size: 10px;
    color: var(--dim2);
  }
  #refresh-info span { color: var(--dim); }

  /* ── Grid ────────────────────────────────────────────── */
  #grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 2px;
    background: #000;
  }

  .card {
    position: relative;
    overflow: hidden;
    background: #111;
    transition: box-shadow 0.25s ease;
    cursor: pointer;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s ease;
    z-index: 4;
    pointer-events: none;
  }
  .card:not(.playing):hover::after {
    background: rgba(255,255,255,0.07);
  }

  .card.playing {
    box-shadow: inset 0 0 0 2px var(--red);
    z-index: 2;
  }

  .card.playing::before {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 40px rgba(255,0,0,0.15);
    z-index: 3;
    pointer-events: none;
  }

  .card-thumb {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-player {
    position: absolute;
    inset: -10% -10%;
    width: 120%;
    height: 120%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    background: #000;
    z-index: 1;
  }
  .card.playing .card-player { opacity: 1; }

  .card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 14px 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
    z-index: 2;
  }

  .card-stats {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .cs {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .cs svg { width: 12px; height: 12px; fill: rgba(255,255,255,0.55); flex-shrink: 0; }

  .card-rank {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 3;
    font-size: 11px;
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }

  .card-live {
    display: none;
    position: absolute;
    top: 10px; right: 10px;
    z-index: 3;
    align-items: center;
    gap: 5px;
    background: var(--red);
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.8px;
  }
  .card.playing .card-live {
    display: flex;
    animation: blink 1.8s ease-in-out infinite;
  }
  .card-live::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #fff;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Chart section ───────────────────────────────────── */
  #chart-section {
    flex: 0 0 264px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 18px 28px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #chart-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #chart-peak { font-size: 10px; color: var(--dim2); }
  #chart-peak strong { color: var(--dim); font-weight: 600; }

  #chart-wrap { flex: 1; position: relative; }
  canvas { display: block; }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div id="channel-id">
      <div id="channel-icon">
        <svg viewBox="0 0 24 24"><path d="M10 15.5l6-3.5-6-3.5v7z"/></svg>
      </div>
      <div>
        <div id="channel-name">Loading…</div>
        <div id="channel-handle">@channel · Shorts</div>
      </div>
    </div>
    <div id="yt-badge">
      <svg viewBox="0 0 90 20" fill="none">
        <path d="M27.9 3.5a3.5 3.5 0 0 0-2.5-2.5C23.2.5 14.5.5 14.5.5S5.8.5 3.6 1c-1.2.3-2.2 1.3-2.5 2.5C.6 5.7.6 10 .6 10s0 4.3.5 6.5c.3 1.2 1.3 2.2 2.5 2.5 2.2.6 10.9.6 10.9.6s8.7 0 10.9-.6c1.2-.3 2.2-1.3 2.5-2.5.5-2.2.5-6.5.5-6.5s0-4.3-.5-6.5z" fill="#FF0000"/>
        <path d="M11.8 14l7.2-4-7.2-4v8z" fill="#fff"/>
      </svg>
      <span>Live</span>
    </div>
  </div>

  <div id="stat-row">
    <div class="stat">
      <div class="stat-value accent" id="stat-views">—</div>
      <div class="stat-meta">Views · 30 Days</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-likes">—</div>
      <div class="stat-meta">Likes · 30 Days</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-comments">—</div>
      <div class="stat-meta">Comments · 30 Days</div>
    </div>
  </div>
</div>

<div id="section-label">
  <span id="section-title">Top Shorts · Last 30 Days</span>
  <span id="refresh-info">Next refresh in <span id="countdown">—</span></span>
</div>

<div id="grid"></div>

<div id="chart-section">
  <div id="chart-header">
    <span id="chart-label">Views · Last 24 Hours</span>
    <span id="chart-peak">Peak <strong id="peak-val">—</strong></span>
  </div>
  <div id="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script>
const REFRESH_MS  = 15 * 60 * 1000;
const COUNTUP_MS  = 2800;

let videos = [], activeIdx = 0, players = {};
let chart = null, refreshTimer = null, nextRefreshAt = null;

// ── YouTube IFrame API ────────────────────────────────────────────────────────
(function(){ const s=document.createElement("script"); s.src="https://www.youtube.com/iframe_api"; document.head.appendChild(s); })();

function onYouTubeIframeAPIReady(){
  if(videos.length) renderPlayers();
}

// ── Fetch + refresh ───────────────────────────────────────────────────────────
async function refresh(){
  try {
    const [vRes,mRes,cRes] = await Promise.all([
      fetch("/api/youtube/videos"),
      fetch("/api/youtube/metrics"),
      fetch("/api/youtube/chart"),
    ]);
    const [vids,metrics,chartData] = await Promise.all([vRes.json(),mRes.json(),cRes.json()]);
    videos = vids;
    applyStats(metrics);
    buildGrid(vids);
    buildChart(chartData);
  } catch(e){ console.error("refresh:",e); }
  scheduleNext();
}

function scheduleNext(){
  clearTimeout(refreshTimer);
  nextRefreshAt = Date.now() + REFRESH_MS;
  refreshTimer  = setTimeout(refresh, REFRESH_MS);
}

// ── Countdown ─────────────────────────────────────────────────────────────────
setInterval(()=>{
  if(!nextRefreshAt) return;
  const s=Math.max(0,Math.round((nextRefreshAt-Date.now())/1000));
  document.getElementById("countdown").textContent=
    `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
},1000);

// ── Formatting ────────────────────────────────────────────────────────────────
function fmt(n){
  if(n>=1e6) return(n/1e6).toFixed(n>=10e6?1:2)+"M";
  if(n>=1e3) return(n/1e3).toFixed(n>=100e3?0:1)+"K";
  return n.toLocaleString();
}

function countUp(el,target){
  const steps=80;
  let step=0;
  const t=setInterval(()=>{
    step++;
    const p=step/steps, ease=p<0.5?2*p*p:-1+(4-2*p)*p;
    el.textContent=fmt(Math.round(target*ease));
    if(step>=steps){clearInterval(t);el.textContent=fmt(target);}
  },COUNTUP_MS/steps);
}

function applyStats(m){
  countUp(document.getElementById("stat-views"),    m.views);
  countUp(document.getElementById("stat-likes"),    m.likes);
  countUp(document.getElementById("stat-comments"), m.comments);
}

// ── Grid ──────────────────────────────────────────────────────────────────────
const EYE  = `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>`;
const LIKE = `<svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>`;

function buildGrid(vids){
  const g=document.getElementById("grid");

  // Remove stale cards
  const newIds=new Set(vids.map(v=>v.video_id));
  [...g.querySelectorAll(".card")].forEach(c=>{
    if(!newIds.has(c.dataset.vid)){ players[c.dataset.vid]?.destroy(); delete players[c.dataset.vid]; c.remove(); }
  });

  vids.forEach((v,i)=>{
    let card=g.querySelector(`[data-vid="${v.video_id}"]`);
    if(!card){
      card=document.createElement("div");
      card.className="card";
      card.dataset.vid=v.video_id;

      const thumb=document.createElement("img");
      thumb.className="card-thumb";
      thumb.src=v.thumbnail_url;
      thumb.alt="";

      const playerDiv=document.createElement("div");
      playerDiv.className="card-player";
      playerDiv.id=`pl-${v.video_id}`;

      const overlay=document.createElement("div");
      overlay.className="card-overlay";

      const stats=document.createElement("div");
      stats.className="card-stats";
      stats.innerHTML=`<span class="cs">${EYE}${fmt(v.views)}</span><span class="cs">${LIKE}${fmt(v.likes)}</span>`;
      overlay.appendChild(stats);

      const rank=document.createElement("div");
      rank.className="card-rank";
      rank.textContent=i+1;

      const live=document.createElement("div");
      live.className="card-live";
      live.textContent="LIVE";

      card.append(thumb,playerDiv,overlay,rank,live);
      card.addEventListener("click",()=>setActive(i));
      g.appendChild(card);
    } else {
      // Refresh stats only
      const stats=card.querySelector(".card-stats");
      if(stats) stats.innerHTML=`<span class="cs">${EYE}${fmt(v.views)}</span><span class="cs">${LIKE}${fmt(v.likes)}</span>`;
    }
  });

  renderPlayers();
  if(typeof YT!=="undefined"&&YT.Player) setActive(activeIdx);
}

function renderPlayers(){
  if(typeof YT==="undefined"||!YT.Player) return;
  videos.forEach(v=>{
    if(players[v.video_id]) return;
    const isActive = v.video_id === (videos[activeIdx]||{}).video_id;
    players[v.video_id]=new YT.Player(`pl-${v.video_id}`,{
      videoId:v.video_id,
      playerVars:{autoplay: isActive ? 1 : 0, mute:1,controls:0,modestbranding:1,rel:0,playsinline:1,loop:1,playlist:v.video_id},
      events:{
        onReady:(e)=>{ e.target.mute(); if(isActive) e.target.playVideo(); },
        onStateChange:(e)=>{
          if(e.data===YT.PlayerState.ENDED){
            try{ e.target.seekTo(0); e.target.playVideo(); }catch(_){}
          }
        }
      }
    });
  });
}

function setActive(idx){
  if(!videos.length) return;
  activeIdx=((idx%videos.length)+videos.length)%videos.length;
  const vid=videos[activeIdx];
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("playing"));
  document.querySelector(`[data-vid="${vid.video_id}"]`)?.classList.add("playing");
  Object.entries(players).forEach(([id,p])=>{
    if(id===vid.video_id){ try{p.loadVideoById({videoId:id,startSeconds:0});p.mute();}catch(_){} }
    else { try{p.stopVideo();}catch(_){} }
  });
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function buildChart(data){
  const wrap=document.getElementById("chart-wrap");
  const cv=document.getElementById("chart");
  cv.width=wrap.clientWidth; cv.height=wrap.clientHeight;

  const peak=data.values.length?Math.max(...data.values):0;
  document.getElementById("peak-val").textContent=fmt(peak)+" views";

  if(chart) chart.destroy();
  chart=new Chart(cv.getContext("2d"),{
    type:"bar",
    data:{
      labels:data.labels,
      datasets:[{
        data:data.values,
        backgroundColor:(ctx)=>ctx.raw===peak?"rgba(255,0,0,0.95)":"rgba(255,0,0,0.45)",
        borderWidth:0,
        borderRadius:2,
        hoverBackgroundColor:"rgba(255,0,0,0.9)",
      }]
    },
    options:{
      responsive:false,
      animation:{duration:800,delay:(c)=>c.dataIndex*3},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:"rgba(0,0,0,0.85)",
          titleColor:"#888",bodyColor:"#fff",padding:8,
          callbacks:{label:(c)=>` ${fmt(c.raw)} views`}
        }
      },
      scales:{
        x:{ticks:{color:"#383838",font:{size:8},maxRotation:0,maxTicksLimit:13},grid:{color:"rgba(255,255,255,0.02)"},border:{color:"#1a1a1a"}},
        y:{ticks:{color:"#383838",font:{size:8},callback:(v)=>fmt(v)},grid:{color:"rgba(255,255,255,0.03)"},border:{color:"#1a1a1a"}}
      }
    }
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>
